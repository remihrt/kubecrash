apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h0m0s
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "68.3.2"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    fullnameOverride: kube-prometheus-stack

    prometheusOperator:
      resources:
        requests: { cpu: 50m, memory: 64Mi }
        limits: { cpu: 200m, memory: 128Mi }

    prometheus:
      prometheusSpec:
        replicas: 1
        retention: 7d
        storageSpec: {}
        scrapeInterval: "30s"
        evaluationInterval: "30s"
        resources:
          requests: { cpu: 200m, memory: 512Mi }
          limits: { cpu: 500m, memory: 1Gi }

    grafana:
      replicas: 1
      adminPassword: "admin"
      persistence:
        enabled: false
      service:
        type: NodePort
        nodePort: 32000
      resources:
        requests: { cpu: 50m, memory: 128Mi }
        limits: { cpu: 200m, memory: 256Mi }

    alertmanager:
      alertmanagerSpec:
        replicas: 1
        storage: {}
        resources:
          requests: { cpu: 10m, memory: 32Mi }
          limits: { cpu: 100m, memory: 64Mi }

    # Disabled: etcd requires client certs, controller-manager/scheduler
    # bind to 127.0.0.1 on kubeadm, kube-proxy replaced by Cilium
    kubeEtcd:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeProxy:
      enabled: false
